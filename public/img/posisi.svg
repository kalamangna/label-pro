  </defs>

  <!-- Real Label Backing (Amber-100) -->
  <rect x="20" y="20" width="360" height="520" rx="24" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2"/>
  
  <!-- White Stickers -->
  <g fill="#FFFFFF" filter="url(#shadow)">
    <rect x="40" y="40" width="150" height="80" rx="12" stroke="#FDE047" stroke-width="1"/>
